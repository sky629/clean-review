server:
  port: ${REVIEW_SERVICE_PORT:8082}

spring:
  application:
    name: review-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/clean_review}
    username: ${POSTGRES_USER:clean_review}
    password: ${POSTGRES_PASSWORD:clean_review}
  flyway:
    enabled: true
    table: flyway_schema_history_review
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

clean-review:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  kafka:
    topics:
      review-collection-requested: ${KAFKA_TOPIC_REVIEW_COLLECTION_REQUESTED:review.collection.requested}
  collection:
    initial-backfill-days: ${REVIEW_INITIAL_BACKFILL_DAYS:30}
    resync-overlap-hours: ${REVIEW_RESYNC_OVERLAP_HOURS:1}
    max-reviews-per-source: ${REVIEW_COLLECTOR_MAX_REVIEWS_PER_SOURCE:100}
