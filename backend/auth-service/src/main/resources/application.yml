server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/clean_review}
    username: ${POSTGRES_USER:clean_review}
    password: ${POSTGRES_PASSWORD:clean_review}
  flyway:
    enabled: true
    table: flyway_schema_history_auth
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - email
              - profile

clean-review:
  jwt:
    issuer: ${JWT_ISSUER:clean-review}
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  google:
    client-id: ${GOOGLE_CLIENT_ID:change-me}
    client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
  oauth:
    authorization-url: ${OAUTH_AUTHORIZATION_URL:/oauth2/authorization/google}
  frontend:
    auth-success-uri: ${FRONTEND_AUTH_SUCCESS_URI:http://localhost:5173/oauth/google/callback}
    allowed-redirect-uris: ${FRONTEND_ALLOWED_REDIRECT_URIS:}
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    path: ${AUTH_COOKIE_PATH:/}
    domain: ${AUTH_COOKIE_DOMAIN:}
    refresh-token-max-age-seconds: ${AUTH_COOKIE_REFRESH_TOKEN_MAX_AGE_SECONDS:2592000}
