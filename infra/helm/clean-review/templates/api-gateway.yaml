apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: {{ .Values.services.apiGateway.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.apiGateway.port }}
          envFrom:
            - configMapRef:
                name: clean-review-config
            - secretRef:
                name: clean-review-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.apiGateway.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: {{ .Values.services.apiGateway.port }}

