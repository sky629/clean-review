services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.0.0
    hostname: kafka
    container_name: clean-review-kafka
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

  api-gateway:
    profiles: ["app"]
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URI: http://auth-service:8081
      REVIEW_SERVICE_URI: http://review-service:8082
      NOTIFICATION_SERVICE_URI: http://notification-service:8083
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS}
    ports:
      - "${API_GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      - auth-service
      - review-service
      - notification-service

  auth-service:
    profiles: ["app"]
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_AUTHORIZATION_URL: http://localhost:${API_GATEWAY_HOST_PORT:-8080}/oauth2/authorization/google
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      FRONTEND_AUTH_SUCCESS_URI: ${FRONTEND_AUTH_SUCCESS_URI}
      FRONTEND_ALLOWED_REDIRECT_URIS: ${FRONTEND_ALLOWED_REDIRECT_URIS}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "${AUTH_SERVICE_HOST_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  review-service:
    profiles: ["app"]
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: review-service
    environment:
      REVIEW_SERVICE_PORT: ${REVIEW_SERVICE_PORT}
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_REVIEW_COLLECTION_REQUESTED: ${KAFKA_TOPIC_REVIEW_COLLECTION_REQUESTED}
      JWT_SECRET: ${JWT_SECRET}
      REVIEW_COLLECTOR_MAX_REVIEWS_PER_SOURCE: ${REVIEW_COLLECTOR_MAX_REVIEWS_PER_SOURCE:-100}
      REVIEW_INITIAL_BACKFILL_DAYS: ${REVIEW_INITIAL_BACKFILL_DAYS:-30}
      REVIEW_RESYNC_OVERLAP_HOURS: ${REVIEW_RESYNC_OVERLAP_HOURS:-1}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
    ports:
      - "${REVIEW_SERVICE_HOST_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification-service:
    profiles: ["app"]
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    environment:
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_REVIEW_ANALYSIS_COMPLETED: ${KAFKA_TOPIC_REVIEW_ANALYSIS_COMPLETED}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  frontend:
    profiles: ["app"]
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      - api-gateway

  review-analysis-worker:
    profiles: ["worker"]
    build:
      context: ../../workers/review-analysis-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_REVIEW_COLLECTION_REQUESTED: ${KAFKA_TOPIC_REVIEW_COLLECTION_REQUESTED}
      KAFKA_TOPIC_REVIEW_ANALYSIS_COMPLETED: ${KAFKA_TOPIC_REVIEW_ANALYSIS_COMPLETED}
      WORKER_CONSUMER_GROUP_ID: review-analysis-worker
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      REVIEW_ANALYZER_MODE: ${REVIEW_ANALYZER_MODE}
      NAVER_SEARCH_CLIENT_ID: ${NAVER_SEARCH_CLIENT_ID}
      NAVER_SEARCH_CLIENT_SECRET: ${NAVER_SEARCH_CLIENT_SECRET}
      REVIEW_COLLECTOR_MAX_REVIEWS_PER_SOURCE: ${REVIEW_COLLECTOR_MAX_REVIEWS_PER_SOURCE:-100}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  kafka-data:
